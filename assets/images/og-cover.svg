<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset="1" stop-color="#16161a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#87682a"/>
      <stop offset="0.5" stop-color="#c9a45a"/>
      <stop offset="1" stop-color="#87682a"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(201,164,90,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Sol dekoratif yapı -->
  <g transform="translate(80,150)">
    <rect x="0" y="40" width="80" height="280" fill="#3a342a" opacity="0.7"/>
    <rect x="80" y="120" width="140" height="200" fill="#1a1a1f" opacity="0.9"/>
    <rect x="220" y="200" width="60" height="120" fill="#3a342a" opacity="0.7"/>
    <rect x="-5" y="35" width="90" height="3" fill="url(#gold)" opacity="0.6"/>
    <rect x="80" y="115" width="140" height="3" fill="url(#gold)" opacity="0.6"/>
  </g>

  <!-- Metin -->
  <g transform="translate(440,200)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="14" letter-spacing="6" fill="#c9a45a" font-weight="500">SIIRT • MİMARLIK &amp; TASARIM</text>
    <text x="0" y="80" font-family="Georgia, serif" font-size="64" font-weight="400" fill="#f4f1ea" letter-spacing="-2">Mehmet Can</text>
    <text x="0" y="160" font-family="Georgia, serif" font-size="64" font-weight="400" font-style="italic" fill="#c9a45a" letter-spacing="-2">Baykan</text>
    <text x="0" y="220" font-family="Inter, sans-serif" font-size="20" fill="#a39c8a" letter-spacing="2">Restorasyon · İç Mimari · Peyzaj</text>

    <line x1="0" y1="270" x2="200" y2="270" stroke="#c9a45a" stroke-width="1" opacity="0.6"/>
    <text x="0" y="300" font-family="Inter, sans-serif" font-size="14" fill="#6f6859" letter-spacing="3">mehmetcanbaykan.com</text>
  </g>
</svg>
